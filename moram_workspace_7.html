<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MORAM SPACE — 작업용 설정툴</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;500&family=Oswald:wght@300;400;500&family=Raleway:wght@300;400;500&family=Montserrat:wght@300;400;500&family=Playfair+Display:wght@400;500&family=Space+Grotesk:wght@300;400;500&family=DM+Sans:wght@300;400;500&family=Libre+Baskerville:wght@400&family=Cormorant+Garamond:wght@300;400;500&family=Noto+Sans+KR:wght@300;400;500&family=Black+Han+Sans&family=Jua&family=Gugi&family=Do+Hyeon&family=Nanum+Gothic:wght@400;700&family=Nanum+Myeongjo:wght@400;700&family=Gowun+Dodum&family=Gowun+Batang&family=Sunflower:wght@300;500&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; overflow:hidden; font-family:sans-serif; background:#0d0d1a; }
.workspace { display:flex; height:100vh; width:100%; }
.sidebar { width:260px; min-width:260px; height:100vh; background:#111122; border-right:1px solid rgba(255,255,255,0.1); overflow-y:auto; padding:14px 12px; display:flex; flex-direction:column; gap:10px; }
.sidebar::-webkit-scrollbar { width:4px; }
.sidebar::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.15); border-radius:2px; }
.sb-logo { font-size:11px; letter-spacing:0.2em; color:rgba(255,255,255,0.3); padding:4px 0 8px; border-bottom:0.5px solid rgba(255,255,255,0.08); margin-bottom:2px; }
.sb-sec { background:rgba(255,255,255,0.04); border:0.5px solid rgba(255,255,255,0.08); border-radius:10px; padding:10px 12px; }
.sb-title { font-size:9px; letter-spacing:0.15em; color:rgba(255,255,255,0.35); margin-bottom:10px; text-transform:uppercase; }
.page-tabs { display:flex; flex-direction:column; gap:4px; }
.page-tab { width:100%; padding:7px 10px; border:0.5px solid rgba(255,255,255,0.1); border-radius:7px; background:transparent; color:rgba(255,255,255,0.45); font-size:10px; cursor:pointer; text-align:left; transition:all 0.2s; display:flex; align-items:center; gap:6px; }
.page-tab:hover { background:rgba(255,255,255,0.06); color:rgba(255,255,255,0.7); }
.page-tab.active { background:rgba(255,255,255,0.1); color:white; border-color:rgba(255,255,255,0.3); }
.page-tab .pt-dot { width:6px; height:6px; border-radius:50%; background:rgba(255,255,255,0.2); flex-shrink:0; }
.page-tab.active .pt-dot { background:#4ade80; }
.view-tabs { display:flex; gap:5px; }
.view-tab { flex:1; padding:6px 4px; border:0.5px solid rgba(255,255,255,0.12); border-radius:7px; background:transparent; color:rgba(255,255,255,0.45); font-size:10px; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:4px; transition:all 0.2s; }
.view-tab.active { background:rgba(255,255,255,0.1); color:white; border-color:rgba(255,255,255,0.3); }
.w-row { display:flex; align-items:center; gap:6px; margin-top:8px; }
.w-lbl { font-size:10px; color:rgba(255,255,255,0.45); white-space:nowrap; }
.w-input { width:58px; padding:4px 6px; border:0.5px solid rgba(255,255,255,0.18); border-radius:5px; font-size:11px; color:white; background:rgba(255,255,255,0.07); text-align:center; }
.w-input:focus { outline:none; border-color:rgba(255,255,255,0.35); }
.w-unit { font-size:10px; color:rgba(255,255,255,0.35); }
.presets { display:flex; gap:3px; margin-top:7px; flex-wrap:wrap; }
.pb { font-size:9px; padding:3px 7px; border:0.5px solid rgba(255,255,255,0.12); border-radius:4px; background:transparent; color:rgba(255,255,255,0.45); cursor:pointer; transition:all 0.15s; }
.pb:hover { background:rgba(255,255,255,0.08); color:white; }
.color-row { display:flex; align-items:center; gap:8px; margin-bottom:7px; }
.color-row:last-of-type { margin-bottom:0; }
.c-lbl { font-size:10px; color:rgba(255,255,255,0.45); min-width:52px; }
input[type=color] { width:28px; height:24px; border:0.5px solid rgba(255,255,255,0.18); border-radius:5px; cursor:pointer; padding:2px; background:transparent; }
.c-hex { font-size:10px; color:rgba(255,255,255,0.3); }
.reset-btn { font-size:9px; padding:4px 10px; border:0.5px solid rgba(255,255,255,0.15); border-radius:5px; background:transparent; color:rgba(255,255,255,0.45); cursor:pointer; margin-top:8px; display:block; transition:all 0.15s; }
.reset-btn:hover { background:rgba(255,255,255,0.08); color:white; }
.badge-row { display:flex; flex-direction:column; gap:5px; margin-bottom:10px; }
.badge { display:flex; align-items:center; gap:5px; background:rgba(74,222,128,0.06); border:0.5px solid rgba(74,222,128,0.3); border-radius:20px; padding:4px 10px; }
.badge-type { font-size:8px; color:rgba(255,255,255,0.35); min-width:22px; }
.badge-check { color:#4ade80; font-size:10px; }
.badge-name { font-size:10px; color:white; }
.font-sec-title { font-size:9px; color:rgba(255,255,255,0.35); margin-bottom:5px; margin-top:8px; }
.font-grid { display:grid; grid-template-columns:1fr 1fr; gap:4px; }
.font-btn { border:0.5px solid rgba(255,255,255,0.08); border-radius:6px; padding:5px 7px; background:transparent; cursor:pointer; text-align:left; color:white; position:relative; transition:all 0.15s; }
.font-btn:hover { background:rgba(255,255,255,0.06); border-color:rgba(255,255,255,0.2); }
.font-btn.active { border-color:#4ade80; background:rgba(74,222,128,0.06); }
.font-btn .ck { display:none; position:absolute; top:4px; right:5px; color:#4ade80; font-size:10px; }
.font-btn.active .ck { display:block; }
.fname { font-size:8px; color:rgba(255,255,255,0.35); margin-bottom:2px; }
.fpreview { font-size:12px; line-height:1.3; color:rgba(255,255,255,0.9); }
.export-btn { width:100%; padding:10px; border:0.5px solid rgba(255,255,255,0.2); border-radius:8px; background:rgba(255,255,255,0.06); color:white; font-size:11px; cursor:pointer; letter-spacing:0.05em; transition:all 0.2s; margin-top:2px; }
.export-btn:hover { background:rgba(255,255,255,0.12); border-color:rgba(255,255,255,0.35); }
.preview-area { flex:1; height:100vh; overflow:hidden; display:flex; flex-direction:column; background:#0d0d1a; }
.preview-topbar { display:flex; align-items:center; justify-content:space-between; padding:10px 16px; border-bottom:0.5px solid rgba(255,255,255,0.06); flex-shrink:0; }
.preview-label { font-size:10px; color:rgba(255,255,255,0.3); letter-spacing:0.1em; }
#preview-frame { border:none; display:block; width:100%; flex:1; }
</style>
</head>
<body>
<div class="workspace">

  <div class="sidebar">
    <div class="sb-logo">MORAM SPACE · 설정툴</div>

    <div class="sb-sec">
      <div class="sb-title">페이지 미리보기</div>
      <div class="page-tabs">
        <button class="page-tab active" id="ptab-main"        onclick="setPage('main')">       <span class="pt-dot"></span>메인 홈페이지</button>
        <button class="page-tab"        id="ptab-service"     onclick="setPage('service')">    <span class="pt-dot"></span>서비스 선택 화면</button>
        <button class="page-tab"        id="ptab-consulting"  onclick="setPage('consulting')"> <span class="pt-dot"></span>컨설팅 서비스 상세</button>
      </div>
    </div>

    <div class="sb-sec">
      <div class="sb-title">뷰 모드 / 콘텐츠 너비</div>
      <div class="view-tabs">
        <button class="view-tab active" id="tab-m" onclick="setView('mobile')">📱 모바일</button>
        <button class="view-tab"        id="tab-p" onclick="setView('pc')">🖥 PC</button>
      </div>
      <div class="w-row">
        <span class="w-lbl">콘텐츠 너비</span>
        <input type="number" class="w-input" id="w-input" value="390" min="320" max="1920" oninput="pushToFrame()">
        <span class="w-unit">px</span>
      </div>
      <div class="presets">
        <button class="pb" onclick="setWidth(390)">390</button>
        <button class="pb" onclick="setWidth(768)">768</button>
        <button class="pb" onclick="setWidth(1280)">1280</button>
        <button class="pb" onclick="setWidth(1920)">1920</button>
      </div>
    </div>

    <div class="sb-sec">
      <div class="sb-title">컬러</div>
      <div class="color-row">
        <span class="c-lbl">짙은 배경</span>
        <input type="color" id="c1" value="#193b71" oninput="onColorChange('c1')">
        <span class="c-hex" id="hex-c1">#193b71</span>
      </div>
      <div class="color-row">
        <span class="c-lbl">밝은 배경</span>
        <input type="color" id="c2" value="#274b77" oninput="onColorChange('c2')">
        <span class="c-hex" id="hex-c2">#274b77</span>
      </div>
      <button class="reset-btn" onclick="resetColors()">↺ 초기화</button>
    </div>

    <div class="sb-sec">
      <div class="sb-title">폰트</div>
      <div class="badge-row">
        <div class="badge"><span class="badge-type">한글</span><span class="badge-check">✓</span><span class="badge-name" id="badge-ko">Sunflower</span></div>
        <div class="badge"><span class="badge-type">영문</span><span class="badge-check">✓</span><span class="badge-name" id="badge-en">Cormorant Garamond</span></div>
      </div>
      <div class="font-sec-title">한글 폰트</div>
      <div class="font-grid" id="ko-grid"></div>
      <div class="font-sec-title">영문 폰트</div>
      <div class="font-grid" id="en-grid"></div>
    </div>

    <div class="sb-sec">
      <div class="sb-title">내보내기</div>
      <button class="export-btn" onclick="exportHTML()">⬇ 배포용 index.html 다운로드</button>
    </div>
  </div>

  <div class="preview-area">
    <div class="preview-topbar">
      <span class="preview-label" id="preview-label">📱 모바일 — 콘텐츠 390px — 메인 홈페이지</span>
    </div>
    <iframe id="preview-frame" scrolling="yes"></iframe>
  </div>

</div>
<script>
const koFonts = [
  {name:'Sunflower',      preview:'모람공간 건축'},
  {name:'Noto Sans KR',   preview:'모람공간 건축'},
  {name:'Black Han Sans', preview:'모람공간 건축'},
  {name:'Jua',            preview:'모람공간 건축'},
  {name:'Gugi',           preview:'모람공간 건축'},
  {name:'Do Hyeon',       preview:'모람공간 건축'},
  {name:'Nanum Gothic',   preview:'모람공간 건축'},
  {name:'Nanum Myeongjo', preview:'모람공간 건축'},
  {name:'Gowun Dodum',    preview:'모람공간 건축'},
  {name:'Gowun Batang',   preview:'모람공간 건축'},
];
const enFonts = [
  {name:'Cormorant Garamond', preview:'MORAM SPACE'},
  {name:'Bebas Neue',         preview:'MORAM SPACE'},
  {name:'Barlow',             preview:'MORAM SPACE'},
  {name:'Oswald',             preview:'MORAM SPACE'},
  {name:'Raleway',            preview:'MORAM SPACE'},
  {name:'Montserrat',         preview:'MORAM SPACE'},
  {name:'Playfair Display',   preview:'MORAM SPACE'},
  {name:'Space Grotesk',      preview:'MORAM SPACE'},
  {name:'DM Sans',            preview:'MORAM SPACE'},
  {name:'Libre Baskerville',  preview:'MORAM SPACE'},
];
let curKo  = 'Sunflower';
let curEn  = 'Cormorant Garamond';
let curPage = 'main';

function buildGrid(fonts, id, type) {
  const g = document.getElementById(id);
  fonts.forEach(f => {
    const b = document.createElement('button');
    b.className = 'font-btn' + (f.name === (type==='ko'?curKo:curEn) ? ' active' : '');
    b.innerHTML = `<span class="ck">✓</span><div class="fname">${f.name}</div><div class="fpreview" style="font-family:'${f.name}',sans-serif;">${f.preview}</div>`;
    b.onclick = () => selectFont(f.name, type, id);
    g.appendChild(b);
  });
}
function selectFont(name, type, id) {
  if (type==='ko'){curKo=name;document.getElementById('badge-ko').textContent=name;}
  else            {curEn=name;document.getElementById('badge-en').textContent=name;}
  document.querySelectorAll('#'+id+' .font-btn').forEach((b,i)=>{
    const list=type==='ko'?koFonts:enFonts;
    b.classList.toggle('active',list[i].name===name);
  });
  pushToFrame();
}
function setPage(p){
  curPage=p;
  ['main','service','consulting'].forEach(id=>{
    document.getElementById('ptab-'+id).classList.toggle('active',id===p);
  });
  pushToFrame();
}
function setView(v){
  document.getElementById('tab-m').classList.toggle('active',v==='mobile');
  document.getElementById('tab-p').classList.toggle('active',v==='pc');
  setWidth(v==='mobile'?390:1280);
}
function setWidth(w){document.getElementById('w-input').value=w;pushToFrame();}
function onColorChange(id){document.getElementById('hex-'+id).textContent=document.getElementById(id).value;pushToFrame();}
function resetColors(){
  document.getElementById('c1').value='#193b71';document.getElementById('c2').value='#274b77';
  document.getElementById('hex-c1').textContent='#193b71';document.getElementById('hex-c2').textContent='#274b77';
  pushToFrame();
}

/* ── 공통 변수 ── */
function getVars(){
  const c1=document.getElementById('c1').value;
  const c2=document.getElementById('c2').value;
  const w=parseInt(document.getElementById('w-input').value)||390;
  const isPC=w>=768;
  function hexToRgb(h){return{r:parseInt(h.slice(1,3),16),g:parseInt(h.slice(3,5),16),b:parseInt(h.slice(5,7),16)};}
  const {r,g,b}=hexToRgb(c1);
  return {c1,c2,w,isPC,r,g,b};
}

/* ── 공통 HEAD ── */
function commonHead(c1,c2,w,isPC,r,g,b){
  const np=isPC?'16px 48px':'12px 20px';
  const nf=isPC?'18px':'14px';
  const lf=isPC?'13px':'10px';
  const lg=isPC?'28px':'14px';
  const sl=isPC?'flex':'none';
  const sh=isPC?'none':'flex';
  const sp=isPC?'60px 48px':'28px 20px';
  return `<!DOCTYPE html>
<html lang="ko"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>MORAM SPACE</title>
<link href="https://fonts.googleapis.com/css2?family=${curEn.replace(/ /g,'+')}:wght@300;400;500&family=${curKo.replace(/ /g,'+')}:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:${c1};color:white;font-family:'${curKo}',sans-serif;}
.nav-wrap{position:sticky;top:0;z-index:100;background:rgba(${r},${g},${b},0.95);border-bottom:0.5px solid rgba(255,255,255,0.12);}
.nav{display:flex;justify-content:space-between;align-items:center;max-width:${w}px;margin:0 auto;padding:${np};}
.logo{font-family:'${curEn}',sans-serif;font-size:${nf};letter-spacing:0.3em;font-weight:400;cursor:pointer;}
.nav-links{display:${sl};gap:${lg};}
.nav-links a{color:rgba(255,255,255,0.82);text-decoration:none;font-size:${lf};letter-spacing:0.08em;cursor:pointer;padding:3px 5px;border-radius:4px;transition:background 0.2s;}
.nav-links a:hover{background:rgba(255,255,255,0.1);}
.hamburger{display:${sh};flex-direction:column;gap:5px;cursor:pointer;padding:4px;}
.hamburger span{width:22px;height:1.5px;background:white;border-radius:2px;}
.mobile-menu{display:none;flex-direction:row;background:rgba(${r},${g},${b},0.97);border-top:0.5px solid rgba(255,255,255,0.1);}
.mobile-menu.open{display:flex;}
.mobile-menu a{flex:1;color:rgba(255,255,255,0.82);text-decoration:none;font-size:11px;padding:14px 4px;text-align:center;cursor:pointer;letter-spacing:0.05em;border-right:0.5px solid rgba(255,255,255,0.07);}
.mobile-menu a:last-child{border-right:none;}
.mobile-menu a:hover{background:rgba(255,255,255,0.07);}
.stripe-dark{background:${c1};width:100%;}
.stripe-mid{background:${c2};width:100%;}
.inner{max-width:${w}px;margin:0 auto;padding:${sp};}
.sec-title{font-family:'${curEn}',sans-serif;font-size:${isPC?'44px':'24px'};letter-spacing:0.12em;font-weight:400;margin-bottom:${isPC?'32px':'16px'};}
.overlay{display:none;position:fixed;inset:0;background:rgba(${r},${g},${b},0.97);flex-direction:column;align-items:center;justify-content:center;gap:14px;text-align:center;z-index:200;}
.overlay.on{display:flex;}
.ov-label{font-size:11px;color:rgba(255,255,255,0.45);letter-spacing:0.15em;}
.ov-title{font-family:'${curEn}',sans-serif;font-size:36px;letter-spacing:0.2em;}
.ov-badge{background:rgba(255,255,255,0.08);border:0.5px solid rgba(255,255,255,0.2);border-radius:20px;padding:6px 18px;font-size:13px;color:rgba(255,255,255,0.6);}
.ov-back{margin-top:4px;padding:8px 22px;border:0.5px solid rgba(255,255,255,0.3);border-radius:6px;background:transparent;color:white;font-size:12px;cursor:pointer;transition:background 0.2s;}
.ov-back:hover{background:rgba(255,255,255,0.1);}
</style></head><body>`;
}

/* ── 공통 NAV ── */
function navHTML(){
  return `<div class="nav-wrap">
  <div class="nav">
    <div class="logo" onclick="showPage('main')">MORAM SPACE</div>
    <nav class="nav-links">
      <a onclick="showOv('About')">About</a>
      <a onclick="showPage('service')">Service</a>
      <a onclick="showOv('Projects')">Projects</a>
      <a onclick="showOv('Contact')">Contact</a>
    </nav>
    <div class="hamburger" id="hamburger" onclick="toggleMenu()"><span></span><span></span><span></span></div>
  </div>
  <nav class="mobile-menu" id="mobile-menu">
    <a onclick="showOv('About');toggleMenu()">About</a>
    <a onclick="showPage('service');toggleMenu()">Service</a>
    <a onclick="showOv('Projects');toggleMenu()">Projects</a>
    <a onclick="showOv('Contact');toggleMenu()">Contact</a>
  </nav>
</div>`;
}

/* ── 공통 SCRIPT ── */
function commonScript(){
  return `<script>
function showOv(n){document.getElementById('ov-title').textContent=n;document.getElementById('overlay').classList.add('on');}
function hideOv(){document.getElementById('overlay').classList.remove('on');}
function toggleMenu(){document.getElementById('mobile-menu').classList.toggle('open');}
function showPage(p){document.querySelectorAll('.page').forEach(el=>el.style.display='none');var el=document.getElementById('page-'+p);if(el)el.style.display='block';}
<\/script>`;
}

/* ── 메인 페이지 ── */
function getMainHTML(c1,c2,w,isPC,r,g,b){
  const mh=isPC?'640px':'280px';
  const hg=isPC?'14px':'8px';
  const hs=isPC?'11px':'8px';
  const hl=isPC?'60px':'40px';
  const ac=isPC?'1fr 1fr':'1fr';
  const ag=isPC?'40px':'16px';
  const ai=isPC?'280px':'180px';
  const at=isPC?'15px':'12px';
  const pc=isPC?'repeat(3,1fr)':'repeat(2,1fr)';
  const ph=isPC?'200px':'100px';
  const pl=isPC?'14px':'11px';
  const cf=isPC?'15px':'12px';
  const cg=isPC?'12px':'8px';
  const svcCols=isPC?'repeat(5,1fr)':'repeat(3,1fr)';
  const svcPad=isPC?'24px 8px':'12px 4px';
  const svcFS=isPC?'13px':'10px';
  const svcIconFS=isPC?'24px':'16px';
  const svcIconMB=isPC?'10px':'6px';
  return `<style>
.hero{width:100%;max-height:${mh};height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(to bottom,rgba(${r},${g},${b},0.5),rgba(${r},${g},${b},0.82)),url('https://images.unsplash.com/photo-1517154421773-0529f29ea451?q=80&w=1600&auto=format&fit=crop') center/cover no-repeat;}
.hero-inner{max-width:${w}px;width:100%;margin:0 auto;display:flex;flex-direction:column;align-items:center;gap:${hg};padding:0 20px;text-align:center;}
.hero-sub{font-family:'${curEn}',sans-serif;font-size:${hs};letter-spacing:0.4em;color:#a8c4e8;}
.hero-title{font-family:'${curEn}',sans-serif;font-size:clamp(28px,6vw,90px);letter-spacing:0.18em;font-weight:400;line-height:1;}
.hero-line{width:${hl};height:0.5px;background:rgba(255,255,255,0.5);}
.hero-desc{font-size:clamp(12px,1.8vw,18px);font-weight:300;color:rgba(255,255,255,0.88);line-height:1.9;}
.about-grid{display:grid;grid-template-columns:${ac};gap:${ag};align-items:center;}

  <p class="cn-ds">전문적인 검토와 객관적인 조언으로<br>성공적인 건축 프로젝트를 지원합니다.</p>
</div>

<div class="stripe-dark">
<div class="cn-wrap">

  <div class="cn-block">

        </div>
        <div class="cn-purp-body">
          <div class="cn-purp-title">신규 프로젝트</div>
          <div class="cn-purp-text">시공을 시작하기 전, 사전에 검토할 수 있는 부분을 최대한 검토하여 프로젝트를 진행하는데 있어 무리없이 마무리까지 진행될 수 있도록 도움</div>
        </div>
      </div>
    </div>
    <div class="cn-panel">
      <div class="cn-purp-row">
        <div class="cn-purp-icon">
          <div class="cn-purp-iconbox"><i class="ti ti-users"></i></div>

        </div>
      </div>
    </div>

    <!-- 2. 컨설팅 역할 -->
    <div class="cn-sechd" style="margin-top:${isPC?'32px':'22px'}">
      <div class="cn-badge"><i class="ti ti-user-check"></i></div>
      <div class="cn-sht">2. 컨설팅 역할</div>
    </div>
    <div class="cn-role-grid">
      <div class="cn-role-item"><i class="ti ti-zoom-question"></i><p>제3자의 객관적 시각으로 전체 과정을 점검·분석</p></div>
      <div class="cn-role-item"><i class="ti ti-shield-check"></i><p>각 단계에서 발생 가능한 리스크 사전 예방</p></div>

    </div>

    <!-- 3. 기대효과 -->
    <div class="cn-sechd" style="margin-top:${isPC?'32px':'22px'}">
      <div class="cn-badge"><i class="ti ti-trending-up"></i></div>
      <div class="cn-sht">3. 기대효과</div>
    </div>
    <div class="cn-eff-grid">
      <div class="cn-eff-item"><i class="ti ti-coin"></i><p>시간, 비용<br>절감</p></div>
      <div class="cn-eff-item"><i class="ti ti-mood-smile"></i><p>분쟁 및 민원<br>최소화</p></div>
      <div class="cn-eff-item"><i class="ti ti-star"></i><p>품질 향상 및 프로젝트 성공적 완수</p></div>

        <div class="cn-issue-sub">건축행위 안에 각 파트별 전문가들이 있고, 이들이 사용하는 언어의 뜻이 달라서 발생하는 문제</div>

          <div class="cn-comm-p">
            <div class="cn-comm-bub">···</div>
            <div class="cn-comm-ico"><i class="ti ti-user"></i></div>

          <div class="cn-comm-arr"><i class="ti ti-arrows-horizontal"></i></div>

    <!-- 종합 -->

    </div>

  </div><!-- /cn-block 개요 -->

</div><!-- /stripe-dark cn-wrap -->
</div>

<div class="stripe-mid">
<div class="cn-wrap">

  <!-- ===== 각 과정별 컨설팅 ===== -->
  <div class="cn-block">

    <div style="text-align:center;padding:${isPC?'40px 0 32px':'28px 0 20px'}">
      <div style="font-family:'${curEn}',sans-serif;font-size:${isPC?'11px':'9px'};letter-spacing:0.4em;color:#a8c4e8;margin-bottom:10px;">CONSULTING PROCESS</div>
      <div style="font-family:'${curEn}',sans-serif;font-size:${isPC?'32px':'20px'};letter-spacing:0.12em;font-weight:400;margin-bottom:12px;">각 과정별 컨설팅</div>
      <div style="width:48px;height:0.5px;background:rgba(255,255,255,0.3);margin:0 auto 12px;"></div>
      <div style="font-size:${isPC?'13px':'11px'};font-weight:300;color:rgba(255,255,255,0.6);line-height:1.8;">건축행위의 각 단계에서 발생할 수 있는 이슈를 사전에 검토하고,<br>전문적인 컨설팅으로 최적의 의사결정을 지원합니다.</div>
    </div>

    <!-- ① 도면 컨설팅 -->
    <div class="cn-sechd">
      <div class="cn-badge" style="background:#3a7fc1;"><span style="font-family:'${curEn}',sans-serif;font-size:${isPC?'14px':'11px'};color:white;font-weight:500;">1</span></div>
      <div class="cn-sht">도면 컨설팅</div>
    </div>
    <div class="cn-process">
      <div class="cn-proc-inner">
        <div class="cn-proc-left">
          <div class="cn-proc-iconbox"><i class="ti ti-map-2"></i></div>
          <div class="cn-proc-lefttext">도면 단계에서 발생 가능한 이슈를 사전에 검토하고 보완 방향을 제시합니다.</div>
        </div>
        <div class="cn-proc-right">
          <ul class="cn-proc-bullets">
            <li>도면을 놓고 실제 지어질 때 발생 가능한 이슈 및 주의해야 할 부분들 확인, 보완 방법 구상</li>
            <li>토목/건축/전기/설비/소방 각 파트별 상의하거나 이슈 발생 가능성 확인</li>
            <li>건축주의 의도와 도면상 표현된 것의 차이점 확인 및 조율</li>
          </ul>
        </div>
      </div>
    </div>

    <!-- ② 견적서 컨설팅 -->
    <div class="cn-sechd" style="margin-top:${isPC?'24px':'16px'}">
      <div class="cn-badge" style="background:#2e6ea6;"><span style="font-family:'${curEn}',sans-serif;font-size:${isPC?'14px':'11px'};color:white;font-weight:500;">2</span></div>
      <div class="cn-sht">견적서 컨설팅</div>
    </div>
    <div class="cn-process">
      <div class="cn-proc-inner">
        <div class="cn-proc-left">
          <div class="cn-proc-iconbox"><i class="ti ti-clipboard-check"></i></div>
          <div class="cn-proc-lefttext">견적의 적정성과 누락 사항을 검토하여 예산의 정확성과 투명성을 높입니다.</div>
        </div>
        <div class="cn-proc-right">
          <ul class="cn-proc-bullets">
            <li>도면 물량 확인</li>
            <li>실 물량 확인 / 작업자가 수급 가능한 자재의 범위에서 로스율 및 소비되는 물량을 기준으로 물량 확인</li>
            <li>현장의 여건에 따라 투입되어야 하는 인력, 자재, 장비의 변동을 예상</li>
            <li>견적서 안에 미포함사항이나, 다른 방법으로 제시되어 있는 부분에 대한 확인</li>
          </ul>
        </div>
      </div>
    </div>

    <!-- ③ 시공 컨설팅 -->
    <div class="cn-sechd" style="margin-top:${isPC?'24px':'16px'}">
      <div class="cn-badge" style="background:#8b5cf6;"><span style="font-family:'${curEn}',sans-serif;font-size:${isPC?'14px':'11px'};color:white;font-weight:500;">3</span></div>
      <div class="cn-sht">시공 컨설팅</div>
    </div>
    <div class="cn-process">
      <div class="cn-proc-inner">
        <div class="cn-proc-left">
          <div class="cn-proc-iconbox"><i class="ti ti-crane"></i></div>
          <div class="cn-proc-lefttext">시공 단계의 효율성, 안전성, 경재성을 높일 수 있는 전문적 조언을 제공합니다.</div>
        </div>
        <div class="cn-proc-right">
          <ul class="cn-proc-bullets">
            <li>공정별 시공 방법에 대한 컨설팅</li>
            <li>시공시 필히 확인 되어야 할 부분과 PM/AM적인 차이점 컨설팅</li>
            <li>Field Manual / Autonomous Manufacturing(Manual)</li>
            <li>시공상 금액 절감을 위한 방법과 장·단점 컨설팅</li>
            <li>건물 유지 보수 및 관리를 위한 방법과 장·단점 컨설팅</li>
          </ul>
        </div>
      </div>
    </div>

    <!-- ④ 결재(기성) 컨설팅 -->
    <div class="cn-sechd" style="margin-top:${isPC?'24px':'16px'}">
      <div class="cn-badge" style="background:#d97706;"><span style="font-family:'${curEn}',sans-serif;font-size:${isPC?'14px':'11px'};color:white;font-weight:500;">4</span></div>
      <div class="cn-sht">결재(기성) 컨설팅</div>
    </div>
    <div class="cn-process">
      <div class="cn-proc-inner">
        <div class="cn-proc-left">
          <div class="cn-proc-iconbox"><i class="ti ti-receipt"></i></div>
          <div class="cn-proc-lefttext">기성 청구의 타당성을 판단하고 적정한 지급 의사결정을 지원합니다.</div>
        </div>
        <div class="cn-proc-right">
          <ul class="cn-proc-bullets">
            <li>시공사에서 기성을 청구할 경우 이를 판단하는 것에 대한 컨설팅</li>
            <li>현장 진행 사항과 그에 대한 기성을 비교·판단하고 금회 기성의 타당성에 대한 검토 및 컨설팅</li>
            <li>현장을 확인하고 과기성, 적정기성, 미달기성에 대해 판단하고 추후 진행 방법에 대한 컨설팅</li>
          </ul>
        </div>
      </div>
    </div>

    <!-- 과정별 종합 -->
    <div class="cn-summary" style="margin-top:${isPC?'28px':'20px'}">
      <i class="ti ti-bulb"></i>
      <div class="cn-summary-text">각 과정별 전문적인 검토와 조언을 통해 프로젝트의 효율성, 안전성, 경제성을 높이고 성공적인 완수를 지원합니다.</div>
    </div>

  </div><!-- /cn-block 과정별 -->

</div><!-- /cn-wrap -->
</div>

<div class="stripe-dark">
  <div class="cn-bot">
    <button class="cn-btn" onclick="showPage('service')">← 서비스 선택으로</button>
    <button class="cn-btn p" onclick="showPage('main')">메인으로 돌아가기</button>
  </div>
</div>
</div>`;
}

/* ── 전체 HTML 조립 ── */
function getHTML(){
  const {c1,c2,w,isPC,r,g,b}=getVars();
  const labels={main:'메인 홈페이지',service:'서비스 선택 화면',consulting:'컨설팅 서비스 상세'};
  document.getElementById('preview-label').textContent=(isPC?'🖥 PC':'📱 모바일')+' — 콘텐츠 '+w+'px — '+labels[curPage];
  const disp=(p)=>curPage===p?'block':'none';
  return commonHead(c1,c2,w,isPC,r,g,b)
    +navHTML()
    +`<div id="page-main" class="page" style="display:${disp('main')}">${getMainHTML(c1,c2,w,isPC,r,g,b)}</div>`
    +`<div id="page-service" class="page" style="display:${disp('service')}">${getServiceHTML(c1,c2,w,isPC,r,g,b)}</div>`
    +`<div id="page-consulting" class="page" style="display:${disp('consulting')}">${getConsultingHTML(c1,c2,w,isPC,r,g,b)}</div>`
    +`<div class="overlay" id="overlay"><p class="ov-label">MORAM SPACE</p><div class="ov-title" id="ov-title"></div><div class="ov-badge">준비 중입니다</div><p style="font-size:12px;color:rgba(255,255,255,0.4);">페이지를 준비하고 있습니다.</p><button class="ov-back" onclick="hideOv()">← 메인으로 돌아가기</button></div>`
    +commonScript()
    +`</body></html>`;
}

function pushToFrame(){document.getElementById('preview-frame').srcdoc=getHTML();}

function exportHTML(){
  const savedPage=curPage;
  curPage='main';
  const html=getHTML();
  curPage=savedPage;
  const blob=new Blob([html],{type:'text/html;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='index.html';
  a.click();
}

buildGrid(koFonts,'ko-grid','ko');
buildGrid(enFonts,'en-grid','en');
window.addEventListener('load',pushToFrame);
</script>
</body>
